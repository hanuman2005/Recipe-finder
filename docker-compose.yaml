services:
  backend:
    build: ./backend
    container_name: recipe-backend
    ports:
      - "5000:5000"
    networks:
      - mern_network
    environment:
      MONGO_URI: mongodb://mongodb:27017/recipe-db
      NODE_ENV: production
      PORT: 5000
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: recipe-frontend
    ports:
      - "3000:3000"
    networks:
      - mern_network
    environment:
      REACT_APP_API_URL: http://backend:5000
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - mern_network
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    container_name: recipe-redis
    ports:
      - "6379:6379"
    networks:
      - mern_network
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
networks:
  mern_network:
    driver: bridge
volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
